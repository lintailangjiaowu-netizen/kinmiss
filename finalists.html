<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalists | ミス近畿大学2026</title>
  <meta name="description" content="ミス近畿大学2026 ファイナリスト一覧。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="header header--solid" id="header">
    <div class="header__inner">
      <a href="index.html" class="logo">Miss Kindai<span>UNIVERSITY 2026</span></a>
      <nav class="nav" id="nav">
        <ul class="nav__list">
          <li><a href="index.html">TOP</a></li>
          <li><a href="finalists.html">Finalists</a></li>
          <li><a href="outline.html">Outline</a></li>
          <li><a href="news.html">News</a></li>
          <li><a href="sponsors.html">Sponsors</a></li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== Page hero ===== -->
  <section class="page-hero">
    <h1>Finalists</h1>
    <p>ファイナリスト一覧</p>
  </section>

  <!-- ===== Finalists grid ===== -->
  <section class="section">
    <div class="container">
      <div class="cards cards--4" id="finalist-grid">
        <!-- 10 cards injected below -->
      </div>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="footer__logo">Miss Kindai 2026</div>
    <p class="footer__catch">魅せる、私らしさ。</p>
    <div class="footer__sns">
      <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
    </div>
    <p class="footer__org">Miss Kindai University 2026 実行委員会</p>
    <p class="footer__copy">© 2026 Miss Kindai Executive Committee. All Rights Reserved.</p>
  </footer>

  <script>
    // Generate 10 finalist cards
    const grid = document.getElementById('finalist-grid');
    let html = '';
    for (let i = 1; i <= 10; i++) {
      const no = String(i).padStart(2, '0');
      html += `
        <article class="card">
          <div class="placeholder-img ratio-34"><i class="fa-solid fa-camera"></i></div>
          <div class="card__body">
            <span class="card__no">Entry No.${no}</span>
            <span class="card__name">氏名（未定）</span>
            <span class="card__dept">学部（未定）</span>
            <div class="card__sns">
              <a href="#" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
              <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
              <a href="#" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
            </div>
            <a href="profile.html" class="btn btn--ghost btn--sm">プロフィールを見る</a>
          </div>
        </article>`;
    }
    grid.innerHTML = html;

    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const nav = document.getElementById('nav');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('is-open');
      nav.classList.toggle('is-open');
    });
    nav.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      hamburger.classList.remove('is-open');
      nav.classList.remove('is-open');
    }));
  </script>
</body>
</html>
